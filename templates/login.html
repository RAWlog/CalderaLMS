{% extends "base.html" %}

{% block content %}
<div class="full-screen-center">
    <div class="login-card animate-up">
        <div class="login-card-edge"></div>
        
        <div class="text-center mb-4">
            <h2 class="text-white fw-bold mb-2">Авторизация</h2>
            <p class="text-muted small text-uppercase ls-1">
                Вход для роли: <span class="brand-glow">{{ role }}</span>
            </p>
        </div>

        <form method="POST">
            <div class="input-group-custom mb-3">
                <i class="bi bi-person icon-field"></i>
                <input type="text" name="username" class="dark-input" placeholder="Логин" required>
            </div>

            <div class="input-group-custom mb-3">
                <i class="bi bi-shield-lock icon-field"></i>
                <input type="password" name="password" id="password-input" class="dark-input" placeholder="Пароль" required>
                <button type="button" class="password-toggle" onclick="togglePassword()">
                    <i class="bi bi-eye" id="toggle-icon"></i>
                </button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                <div class="checkbox-wrapper">
                    <input type="checkbox" name="remember" id="remember" checked>
                    <label for="remember">Запомнить меня</label>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <span>Войти в систему</span>
                <i class="bi bi-arrow-right-short fs-4"></i>
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('index') }}" class="back-link">
                <i class="bi bi-chevron-left me-1"></i> Вернуться к выбору роли
            </a>
        </div>
    </div>
</div>
<script>
function togglePassword() {
    const input = document.getElementById('password-input');
    const icon = document.getElementById('toggle-icon');
    
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash'); // Меняем иконку на перечеркнутую
    } else {
        input.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}
</script>
{% endblock %}
