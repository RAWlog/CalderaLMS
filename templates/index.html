{% extends "base.html" %}

{% block content %}
<div class="full-screen-center">
    <div class="text-center animate-up">
        <p class="text-uppercase small fw-bold tracking-widest text-muted mb-3">Learning Management System</p>
        <h1 class="mb-4 fw-bolder display-4 text-white">
            Добро пожаловать в <span class="brand-glow">Caldera</span>
        </h1>
        
        <p class="text-secondary mb-5 fs-5">Пожалуйста, выберите вашу роль для входа в систему</p>

        <div class="d-flex justify-content-center gap-4 flex-wrap">
            <a href="{{ url_for('login', role_req='mentor') }}" class="role-card text-decoration-none">
                <div class="card-icon-wrapper mb-4">
                    <i class="bi bi-person-workspace"></i>
                </div>
                <h4 class="fw-bold mb-2 text-white">Наставник</h4>
                <p class="text-muted small mb-0">Управление курсами, материалами и контроль стажеров</p>
            </a>

            <a href="{{ url_for('login', role_req='intern') }}" class="role-card text-decoration-none">
                <div class="card-icon-wrapper mb-4">
                    <i class="bi bi-mortarboard"></i>
                </div>
                <h4 class="fw-bold mb-2 text-white">Стажер</h4>
                <p class="text-muted small mb-0">Прохождение обучения, просмотр тем и сдача заданий</p>
            </a>
        </div>
    </div>
</div>
{% endblock %}
